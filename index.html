<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medi Queue — منصة الحجز والطابور</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script>
    (function () {
      var k = 'mq_currentUser';
      var raw = localStorage.getItem(k);
      var u = null;
      try {
        u = raw ? JSON.parse(raw) : null;
      } catch (e) {
        u = null;
      }
      if (!u) {
        window.location.href = './pages/login.html';
        return;
      }
      if (u.role === 'doctor') window.location.href = './pages/doctor-dashboard.html';
      else if (u.role === 'admin') window.location.href = './pages/admin-dashboard.html';
      else window.location.href = './pages/home.html';
    })();
  </script>
</head>
<body>
  <p style="padding: 2rem; text-align: center; font-family: Cairo, sans-serif">جاري التوجيه…</p>
</body>
</html>
