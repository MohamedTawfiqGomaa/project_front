<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | Medi Queue</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow-x: hidden;
    }
    .auth-card {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
      position: relative;
      z-index: 1;
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      border-radius: var(--radius-lg);
      animation: fadeIn 0.55s ease;
    }
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.65rem;
      font-weight: 800;
      color: var(--primary);
      margin-block-end: 0.35rem;
    }
    .auth-hint {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      margin-block-end: 1.25rem;
      line-height: 1.6;
    }
    .demo-box {
      font-size: 0.82rem;
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      border: 1px dashed color-mix(in srgb, var(--primary) 35%, var(--border));
      border-radius: var(--radius);
      padding: 0.75rem;
      margin-block-end: 1.25rem;
      color: var(--text-secondary);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-mark" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
      </span>
      Medi Queue
    </div>
    <p class="auth-hint">منصة حجز المواعيد وإدارة الطابور بين المرضى والعيادات.</p>

    <div class="demo-box">
      <strong>حسابات تجريبية</strong> (كلمة المرور: <strong>123456</strong>)<br />
      مريض: patient@mediq.local<br />
      طبيب: doctor@mediq.local<br />
      مدير: admin@mediq.local
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">البريد الإلكتروني</label>
        <input class="form-input" type="email" id="email" required placeholder="you@example.com" autocomplete="username" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <input class="form-input" type="password" id="password" required placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg">تسجيل الدخول</button>
    </form>

    <p class="text-center text-secondary" style="margin-top: 1.25rem; font-size: 0.9rem">
      ليس لديك حساب؟
      <a href="register.html" style="color: var(--primary); font-weight: 800">إنشاء حساب</a>
    </p>
    <p class="text-center" style="margin-top: 0.75rem">
      <button type="button" class="btn btn-ghost btn-sm" id="themeToggleAuth">🌙 الوضع الليلي</button>
    </p>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var b = document.getElementById('themeToggleAuth');
      if (AppStore.darkMode) b.textContent = '☀️ الوضع الفاتح';
    });
    document.getElementById('themeToggleAuth').addEventListener('click', function () {
      AppStore.darkMode = !AppStore.darkMode;
      this.textContent = AppStore.darkMode ? '☀️ الوضع الفاتح' : '🌙 الوضع الليلي';
    });

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim().toLowerCase();
      var password = document.getElementById('password').value;
      var users = AppStore.users;
      var found = users.find(function (u) {
        return u.email === email && u.password === password;
      });
      if (!found) {
        MediModal.alert('تعذر الدخول', 'البريد أو كلمة المرور غير صحيحة.');
        return;
      }
      AppStore.currentUser = {
        id: found.id,
        email: found.email,
        name: found.name,
        phone: found.phone,
        role: found.role,
        doctorId: found.doctorId || null,
      };
      window.location.href = redirectForRole(AppStore.currentUser);
    });
  </script>
</body>
</html>
