<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Doctors | MediBook</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .search-section {
            background: white;
            padding: 4rem 0 3rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
            position: relative;
        }
        .filter-chip {
            padding: 0.6rem 1.25rem;
            border-radius: var(--radius-full);
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.875rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .skeleton {
            background: #e2e8f0;
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
            border-radius: var(--radius);
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .stats-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
        }
        .rating-badge {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: #fbbf24;
            font-weight: 700;
        }
        .price-badge {
            font-weight: 700;
            color: var(--text-primary);
        }

        @media (max-width: 640px) {
            .search-section { padding: 3rem 0; }
            .search-section h1 { font-size: 1.75rem !important; }
            .filter-container { 
                margin-top: 1rem;
                overflow-x: auto;
                padding-bottom: 0.5rem;
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .filter-container::-webkit-scrollbar { display: none; }
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <main class="main-content">
        <section class="search-section">
            <div class="container fade-in">
                <h1 style="margin-bottom: 1.5rem; font-size: 2.5rem; font-weight: 800; tracking: -0.025em;">Find the best doctors</h1>
                <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                    <div style="flex: 1; min-width: 250px; position: relative;">
                        <input type="text" id="searchInput" class="form-input" placeholder="Search by name or specialty..." style="padding-left: 3rem; height: 3.5rem; font-size: 1rem;">
                        <svg style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted);" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </div>
                </div>
                <div id="filterContainer" class="filter-container" style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
                    <!-- Filter chips will be injected here -->
                </div>
            </div>
        </section>

        <div class="container">
            <div id="doctorsGrid" class="grid grid-cols-4 fade-in">
                <!-- Doctor cards or skeletons will be injected here -->
            </div>
        </div>
    </main>

    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script>
        let currentFilter = 'All';
        let searchQuery = '';

        function renderFilters() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = specialties.map(s => `
                <button class="filter-chip ${currentFilter === s ? 'active' : ''}" onclick="setFilter('${s}')">${s}</button>
            `).join('');
        }

        function setFilter(filter) {
            currentFilter = filter;
            renderFilters();
            renderDoctors();
        }

        function renderDoctors() {
            const grid = document.getElementById('doctorsGrid');
            const filtered = doctorsData.filter(d => {
                const matchesFilter = currentFilter === 'All' || d.specialty === currentFilter;
                const matchesSearch = d.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                     d.specialty.toLowerCase().includes(searchQuery.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-secondary); background: white; border-radius: 1rem; border: 1px dashed var(--border);">No doctors found matches your search.</div>';
                return;
            }

            grid.innerHTML = filtered.map(d => `
                <div class="card doctor-card fade-in">
                    <img src="${d.image}" alt="${d.name}" class="doctor-image">
                    <div class="doctor-info" style="display: flex; flex-direction: column; flex: 1;">
                        <span class="specialty">${d.specialty}</span>
                        <h3 style="margin-bottom: 0.75rem;">${d.name}</h3>
                        <div class="stats-row">
                            <div class="rating-badge">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                                ${d.rating}
                            </div>
                            <span class="price-badge">${d.price}</span>
                        </div>
                        <a href="doctor-profile.html?id=${d.id}" class="btn btn-primary" style="margin-top: auto;">Book Appointment</a>
                    </div>
                </div>
            `).join('');
        }

        function showSkeletons() {
            const grid = document.getElementById('doctorsGrid');
            grid.innerHTML = Array(4).fill(0).map(() => `
                <div class="card" style="pointer-events: none;">
                    <div class="skeleton" style="width: 100%; aspect-ratio: 1; margin-bottom: 1rem;"></div>
                    <div class="skeleton" style="width: 50%; height: 1rem; margin-bottom: 0.75rem;"></div>
                    <div class="skeleton" style="width: 80%; height: 1.5rem; margin-bottom: 1.25rem;"></div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem;">
                         <div class="skeleton" style="width: 30%; height: 1rem;"></div>
                         <div class="skeleton" style="width: 30%; height: 1rem;"></div>
                    </div>
                    <div class="skeleton" style="width: 100%; height: 3rem; border-radius: 0.5rem;"></div>
                </div>
            `).join('');
        }

        // Search logic
        document.getElementById('searchInput').addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderDoctors();
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderFilters();
            showSkeletons();
            setTimeout(() => {
                renderDoctors();
            }, 800); // Simulate loading delay
        });
    </script>
</body>
</html>
