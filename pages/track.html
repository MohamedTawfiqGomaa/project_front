<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متابعة الدور | Medi Queue</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .tracking-grid {
      display: grid;
      grid-template-columns: 1fr minmax(260px, 320px);
      gap: 1.25rem;
      animation: fadeIn 0.55s ease;
    }
    .main-status-card {
      text-align: center;
      padding: 2.5rem 1.5rem;
    }
    .queue-big-number {
      font-size: clamp(3.5rem, 10vw, 5.5rem);
      font-weight: 900;
      color: var(--primary);
      line-height: 1;
      margin-block: 1.25rem;
    }
    .stats-row {
      display: flex;
      justify-content: center;
      gap: clamp(1.25rem, 4vw, 3rem);
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .stat-item h4 {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-block-end: 0.35rem;
      font-weight: 800;
    }
    .stat-item p {
      font-size: 1.45rem;
      font-weight: 900;
    }
    .hint {
      margin-top: 0.75rem;
      color: var(--text-secondary);
      font-weight: 700;
    }
    @media (max-width: 900px) {
      .tracking-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>
  <main class="main-content">
    <div class="container">
      <div class="tracking-grid">
        <div class="card main-status-card">
          <span id="statusBadge" class="status-badge status-waiting">في الانتظار</span>
          <h2 id="statusText" style="font-size: 1.15rem; font-weight: 900; margin-top: 0.85rem">متابعة الطابور</h2>
          <p class="hint" id="statusHint">يتم تحديث الطابور تلقائياً.</p>

          <div class="queue-big-number" id="queuePos">--</div>

          <div class="progress-container">
            <div id="progressBar" class="progress-bar"></div>
          </div>

          <div class="stats-row">
            <div class="stat-item">
              <h4>عدد المرضى قبلك</h4>
              <p id="peopleAhead">--</p>
            </div>
            <div class="stat-item">
              <h4>الوقت المتوقع</h4>
              <p><span id="waitTime">--</span> <span style="font-size:1rem;font-weight:800">دقيقة</span></p>
            </div>
          </div>
        </div>

        <aside>
          <div class="card">
            <h3 style="margin-block-end: 1rem; font-weight: 900">تفاصيل الموعد</h3>
            <div style="display: flex; gap: 0.75rem; align-items: center; margin-block-end: 1rem">
              <img id="docImg" src="" alt="" style="width: 64px; height: 64px; border-radius: 50%; object-fit: cover" />
              <div style="min-width:0">
                <h4 id="docName" style="font-weight: 900">—</h4>
                <p id="docSpecialty" class="text-secondary" style="font-size: 0.88rem; font-weight: 700">—</p>
              </div>
            </div>
            <div style="padding: 0.85rem; background: color-mix(in srgb, var(--primary) 6%, transparent); border-radius: var(--radius); border: 1px solid var(--border)">
              <div style="display: flex; justify-content: space-between; gap: 0.75rem; margin-block-end: 0.45rem">
                <span class="text-secondary">الموعد</span>
                <span id="aptSlot" style="font-weight: 900">—</span>
              </div>
              <div style="display: flex; justify-content: space-between; gap: 0.75rem">
                <span class="text-secondary">التاريخ</span>
                <span id="aptDate" style="font-weight: 900">—</span>
              </div>
            </div>
            <button type="button" class="btn btn-danger-outline" style="width: 100%; margin-top: 1rem" onclick="cancelAppointment()">إلغاء الموعد</button>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var aptId = urlParams.get('id');
    var appointments = AppStore.appointments;
    let appointment = appointments.find(function (a) {
      return a.id === aptId;
    });

    if (!appointment || appointment.status === 'cancelled' || appointment.status === 'completed') {
      window.location.href = 'my-appointments.html';
    } else {
    var peopleAhead = typeof appointment.peopleAhead === 'number' ? appointment.peopleAhead : 6;
    var startAhead = Math.max(peopleAhead, 0);
    var total = startAhead + 1;
    var notifiedTurn = false;
    var simInterval = null;

    document.getElementById('docImg').src = appointment.doctorImage;
    document.getElementById('docName').textContent = appointment.doctorName;
    document.getElementById('docSpecialty').textContent = appointment.specialty;
    document.getElementById('aptSlot').textContent = appointment.slot;
    document.getElementById('aptDate').textContent = appointment.date;

    function phaseFromAhead(ahead) {
      if (ahead < 0) return 'done';
      if (ahead === 0) return 'your_turn';
      if (ahead <= 3) return 'examining';
      return 'waiting';
    }

    function badgeForPhase(phase) {
      if (phase === 'waiting') return { cls: 'status-badge status-waiting', text: queuePhaseLabel('waiting') };
      if (phase === 'examining') return { cls: 'status-badge status-progress', text: queuePhaseLabel('examining') };
      if (phase === 'your_turn') return { cls: 'status-badge status-yourturn', text: queuePhaseLabel('your_turn') };
      return { cls: 'status-badge status-completed', text: queuePhaseLabel('done') };
    }

    function persist(patch) {
      var apps = AppStore.appointments.slice();
      var idx = apps.findIndex(function (a) {
        return a.id === aptId;
      });
      if (idx === -1) return;
      apps[idx] = Object.assign({}, apps[idx], patch);
      AppStore.appointments = apps;
      appointment = apps[idx];
    }

    function updateUI() {
      var queuePos = document.getElementById('queuePos');
      var peopleAheadEl = document.getElementById('peopleAhead');
      var waitTimeEl = document.getElementById('waitTime');
      var statusBadge = document.getElementById('statusBadge');
      var statusText = document.getElementById('statusText');
      var hint = document.getElementById('statusHint');
      var progressBar = document.getElementById('progressBar');

      var phase = phaseFromAhead(peopleAhead);
      var b = badgeForPhase(phase);
      statusBadge.className = b.cls;
      statusBadge.textContent = b.text;

      if (phase === 'waiting') {
        statusText.textContent = 'أنت في قائمة الانتظار';
        hint.textContent = 'سيتم تقليل عدد المرضى قبلك تلقائياً لمحاكاة الطابور.';
      } else if (phase === 'examining') {
        statusText.textContent = 'جاري كشف المرضى أمامك';
        hint.textContent = 'اقترب دورك، تفضل بالاستعداد عند الباب.';
      } else if (phase === 'your_turn') {
        statusText.textContent = 'تفضل إلى غرفة الطبيب';
        hint.textContent = 'يرجى الحضور خلال دقائق قليلة.';
        if (!notifiedTurn) {
          showNotification('دورك الآن! تفضل إلى عيادة الطبيب.', 'success');
          notifiedTurn = true;
        }
      } else {
        statusText.textContent = 'انتهى الكشف';
        hint.textContent = 'شكراً لاستخدامك منصة Medi Queue.';
        queuePos.textContent = '—';
        peopleAheadEl.textContent = '0';
        waitTimeEl.textContent = '0';
        progressBar.style.width = '100%';
        persist({ peopleAhead: -1, queuePhase: 'done', status: 'completed' });
        if (simInterval) clearInterval(simInterval);
        return;
      }

      var displayNumber = Math.max(peopleAhead + 1, 1);
      queuePos.textContent = String(displayNumber);
      peopleAheadEl.textContent = String(Math.max(peopleAhead, 0));
      var mins = Math.max(peopleAhead, 0) * 5;
      waitTimeEl.textContent = String(mins);

      var progressed = total - Math.max(peopleAhead, 0);
      var pct = Math.min(100, Math.max(0, (progressed / total) * 100));
      progressBar.style.width = pct + '%';

      var st = (appointment && appointment.status) || 'confirmed';
      if (phase === 'your_turn') st = 'confirmed';
      if (phase === 'done') st = 'completed';
      persist({
        peopleAhead: peopleAhead,
        queuePhase: phase,
        status: st,
      });
    }

    function cancelAppointment() {
      MediModal.confirm('إلغاء الموعد', 'سيتم إلغاء الموعد وإيقاف متابعة الطابور.', function () {
        if (simInterval) clearInterval(simInterval);
        var apps = AppStore.appointments.map(function (a) {
          if (a.id !== aptId) return a;
          return Object.assign({}, a, { status: 'cancelled', queuePhase: 'done' });
        });
        AppStore.appointments = apps;
        showNotification('تم إلغاء الموعد.', 'success');
        setTimeout(function () {
          window.location.href = 'my-appointments.html';
        }, 400);
      });
    }

    simInterval = setInterval(function () {
      if (peopleAhead < 0) return;
      peopleAhead -= 1;
      updateUI();
    }, 4000);

    updateUI();
    }
  </script>
</body>
</html>
