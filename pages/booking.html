<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking | MediBook</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .booking-summary {
            background: #f0f7ff;
            border: 1px dashed var(--primary);
            padding: 2rem;
            border-radius: var(--radius-lg);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .booking-summary img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: var(--shadow);
        }

        .booking-summary h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .booking-summary .details {
            font-size: 1rem;
            color: var(--text-secondary);
        }

        .form-grid {
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .booking-summary {
                flex-direction: column;
                text-align: center;
                padding: 1.5rem;
                gap: 1rem;
            }
            .booking-summary img {
                width: 100px;
                height: 100px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .booking-footer {
                flex-direction: column;
                gap: 1.5rem;
                text-align: center;
            }
            .booking-footer .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="particles-container"></div>
    <main class="main-content">
        <div class="container fade-in" style="max-width: 650px;">
            <div class="card">
                <header style="margin-bottom: 2rem; text-align: center;">
                    <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem;">Complete your Booking</h1>
                    <p class="text-secondary">Please review the details and provide patient information.</p>
                </header>
                
                <div id="summaryContainer">
                    <!-- Summary will be injected here -->
                </div>

                <form id="bookingForm">
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Patient Full Name</label>
                            <input type="text" class="form-input" required id="patientName" placeholder="Full name">
                        </div>
                        <div class="form-group">
                            <label class="form-label" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Phone Number</label>
                            <input type="tel" class="form-input" required id="patientPhone" placeholder="01XXXXXXXXX">
                        </div>
                    </div>
                    
                    <div class="form-group" style="margin-top: 1.5rem;">
                        <label class="form-label" style="display: block; font-weight: 600; margin-bottom: 0.5rem; color: var(--text-secondary);">Reason for Visit (Optional)</label>
                        <textarea class="form-input" rows="3" placeholder="Briefly describe your symptoms..."></textarea>
                    </div>

                    <div class="booking-footer" style="margin-top: 2.5rem; display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 2rem;">
                        <p class="text-secondary" style="font-size: 0.875rem;">By clicking confirm, you agree to our terms.</p>
                        <button type="submit" class="btn btn-primary btn-lg" style="padding: 1rem 2rem;">Confirm & Track Appointment</button>
                    </div>
                </form>
            </div>
        </div>
    </main>


    <script src="../js/data.js"></script>
    <script src="../js/main.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const doctorId = parseInt(urlParams.get('id'));
        const slot = urlParams.get('slot');
        const doctor = doctorsData.find(d => d.id === doctorId);

        if (!doctor || !slot) {
            window.location.href = 'home.html';
        }

        document.getElementById('summaryContainer').innerHTML = `
            <div class="booking-summary">
                <img src="${doctor.image}" alt="${doctor.name}">
                <div>
                    <h3>${doctor.name}</h3>
                    <div class="details">
                    <p>${doctor.specialty} • <strong>${slot}</strong> Today</p>
                    <p style="color: var(--primary); font-weight: 700; font-size: 1.25rem; margin-top: 0.5rem;">Price: ${doctor.price}</p>
                </div>
            </div>
        `;

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const appointment = {
                id: 'APT-' + Date.now(),
                doctorId: doctor.id,
                doctorName: doctor.name,
                doctorImage: doctor.image,
                specialty: doctor.specialty,
                slot: slot,
                patientName: document.getElementById('patientName').value,
                patientPhone: document.getElementById('patientPhone').value,
                date: new Date().toLocaleDateString(),
                status: 'Waiting',
                queueNumber: Math.floor(Math.random() * 20) + 1,
                peopleAhead: Math.floor(Math.random() * 10) + 5,
                waitTime: 0 // Will be calculated dynamically in track page
            };

            // Save to appointments
            const apps = AppStore.appointments;
            apps.push(appointment);
            AppStore.appointments = apps;

            // Redirect to tracking page
            window.location.href = `track.html?id=${appointment.id}`;
        });
    </script>
</body>
</html>
