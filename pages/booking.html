<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تأكيد الحجز | Medi Queue</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .booking-summary {
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      border: 1px dashed color-mix(in srgb, var(--primary) 35%, var(--border));
      padding: 1.5rem;
      border-radius: var(--radius-lg);
      margin-block-end: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }
    .booking-summary img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--surface);
      box-shadow: var(--shadow);
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .booking-footer {
      margin-top: 1.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }
    @media (max-width: 720px) {
      .form-grid {
        grid-template-columns: 1fr;
      }
      .booking-summary {
        justify-content: center;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>
  <main class="main-content">
    <div class="container fade-in" style="max-width: 700px">
      <div class="card">
        <header style="margin-block-end: 1.5rem; text-align: center">
          <h1 style="font-size: 1.65rem; font-weight: 900; margin-block-end: 0.35rem">إتمام الحجز</h1>
          <p class="text-secondary">راجع بيانات الطبيب ثم أدخل بياناتك للتأكيد.</p>
        </header>

        <div id="summaryContainer"></div>

        <form id="bookingForm">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label" for="patientName">الاسم الكامل</label>
              <input class="form-input" required id="patientName" placeholder="الاسم كما في الهوية" />
            </div>
            <div class="form-group">
              <label class="form-label" for="patientPhone">رقم الجوال</label>
              <input class="form-input" type="tel" required id="patientPhone" placeholder="05xxxxxxxx" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reason">سبب الزيارة (اختياري)</label>
            <textarea class="form-input" id="reason" rows="3" placeholder="صف أعراضك باختصار…"></textarea>
          </div>

          <div class="booking-footer">
            <p class="text-secondary" style="font-size: 0.88rem; flex: 1; min-width: 220px">
              بالضغط على «تأكيد الحجز» فإنك توافق على سياسة الحجز التجريبية للمنصة.
            </p>
            <button type="submit" class="btn btn-primary btn-lg">تأكيد الحجز</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var doctorId = parseInt(urlParams.get('id'), 10);
    var slot = urlParams.get('slot');
    var doctor = AppStore.getDoctors().find(function (d) {
      return d.id === doctorId;
    });

    if (!doctor || !slot) {
      window.location.href = 'home.html';
    } else {
      var clinic = getClinicById(doctor.clinicId);
      document.getElementById('summaryContainer').innerHTML =
        '<div class="booking-summary">' +
        '<img src="' +
        doctor.image +
        '" alt="" />' +
        '<div style="flex:1;min-width:200px">' +
        '<h3 style="font-size:1.25rem;font-weight:900;margin-block-end:0.35rem">' +
        doctor.name +
        '</h3>' +
        '<p class="text-secondary" style="font-weight:700">' +
        doctor.specialty +
        ' • ' +
        (clinic ? clinic.name : '') +
        '</p>' +
        '<p class="text-secondary" style="margin-top:0.45rem">الموعد: <strong>' +
        slot +
        '</strong> (اليوم)</p>' +
        '<p style="margin-top:0.55rem;color:var(--primary);font-weight:900">' +
        'سعر الكشف: ' +
        formatDoctorPrice(doctor) +
        '</p></div></div>';

      var u = AppStore.currentUser;
      if (u && u.name) document.getElementById('patientName').value = u.name;
      if (u && u.phone) document.getElementById('patientPhone').value = u.phone;
    }

    document.getElementById('bookingForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var clinic = getClinicById(doctor.clinicId);
      var user = AppStore.currentUser;
      var peopleAhead = Math.floor(Math.random() * 8) + 3;
      var appointment = {
        id: 'APT-' + Date.now(),
        doctorId: doctor.id,
        doctorName: doctor.name,
        doctorImage: doctor.image,
        clinicName: clinic ? clinic.name : '',
        specialty: doctor.specialty,
        slot: slot,
        patientName: document.getElementById('patientName').value.trim(),
        patientPhone: document.getElementById('patientPhone').value.trim(),
        patientUserId: user ? user.id : null,
        reason: document.getElementById('reason').value.trim(),
        date: new Date().toLocaleDateString('ar-SA'),
        status: 'confirmed',
        visitStatus: 'queued',
        queueNumber: peopleAhead + 1,
        peopleAhead: peopleAhead,
        queuePhase: 'waiting',
      };
      var apps = AppStore.appointments;
      apps.push(appointment);
      AppStore.appointments = apps;
      window.location.href = 'track.html?id=' + encodeURIComponent(appointment.id);
    });
  </script>
</body>
</html>
