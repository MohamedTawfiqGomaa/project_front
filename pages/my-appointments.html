<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مواعيدي | Medi Queue</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .appointment-item {
      display: flex;
      align-items: stretch;
      gap: 1rem;
      padding: 1.25rem;
      margin-block-end: 0.85rem;
    }
    .date-badge {
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      padding: 0.75rem;
      border-radius: var(--radius);
      text-align: center;
      min-width: 76px;
      align-self: center;
    }
    .date-badge .day {
      font-size: 1.2rem;
      font-weight: 900;
      display: block;
    }
    .date-badge .month {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 700;
    }
    .appointment-actions {
      display: flex;
      gap: 0.55rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge-wrap {
      display: flex;
      justify-content: flex-start;
    }
    @media (max-width: 760px) {
      .appointment-item {
        flex-direction: column;
      }
      .appointment-actions .btn {
        flex: 1 1 auto;
        min-width: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>
  <main class="main-content">
    <div class="container fade-in">
      <div style="display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap; margin-block-end: 1.5rem">
        <h1 style="font-size: 1.75rem; font-weight: 900">مواعيدي</h1>
        <a href="home.html" class="btn btn-primary">حجز جديد</a>
      </div>
      <div id="appointmentsList"></div>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    function mine(app) {
      var u = AppStore.currentUser;
      if (!u) return false;
      if (app.patientUserId && app.patientUserId === u.id) return true;
      if (app.patientPhone && u.phone && app.patientPhone === u.phone) return true;
      return !app.patientUserId;
    }

    function statusClass(code) {
      if (code === 'pending') return 'status-waiting';
      if (code === 'confirmed') return 'status-progress';
      if (code === 'completed') return 'status-completed';
      if (code === 'cancelled') return 'status-cancelled';
      return 'status-waiting';
    }

    function cancelAppointment(id) {
      MediModal.confirm(
        'إلغاء الموعد',
        'هل أنت متأكد من إلغاء هذا الموعد؟',
        function () {
          var apps = AppStore.appointments.map(function (a) {
            if (a.id !== id) return a;
            return Object.assign({}, a, { status: 'cancelled' });
          });
          AppStore.appointments = apps;
          renderAppointments();
          showNotification('تم إلغاء الموعد.', 'success');
        }
      );
    }

    function reschedule(id) {
      var apps = AppStore.appointments;
      var app = apps.find(function (a) {
        return a.id === id;
      });
      if (!app) return;
      window.location.href = 'doctor-profile.html?id=' + app.doctorId;
    }

    function renderAppointments() {
      var container = document.getElementById('appointmentsList');
      var apps = AppStore.appointments.filter(mine).slice().reverse();

      if (!apps.length) {
        container.innerHTML =
          '<div class="card text-center" style="padding: 3rem">' +
          '<h2 style="margin-block-end: 0.5rem; font-weight: 900">لا توجد حجوزات</h2>' +
          '<p class="text-secondary" style="margin-block-end: 1.25rem">ابدأ بحجز موعد مع طبيبك المناسب.</p>' +
          '<a href="home.html" class="btn btn-primary">تصفح الأطباء</a>' +
          '</div>';
        return;
      }

      container.innerHTML = apps
        .map(function (app) {
          var st = app.status || 'confirmed';
          var label = appointmentStatusLabel(st);
          var canCancel = st !== 'completed' && st !== 'cancelled';
          var canReschedule = st !== 'completed' && st !== 'cancelled';
          var canTrack = st !== 'cancelled' && st !== 'completed';
          return (
            '<div class="card appointment-item fade-in">' +
            '<div class="date-badge"><span class="day">التاريخ</span><span class="month">' +
            (app.date || 'اليوم') +
            '</span></div>' +
            '<div style="flex:1;min-width:0">' +
            '<div style="display:flex;justify-content:space-between;gap:0.75rem;flex-wrap:wrap;align-items:flex-start">' +
            '<div><h3 style="font-size:1.1rem;font-weight:900;margin-block-end:0.25rem">' +
            app.doctorName +
            '</h3>' +
            '<p class="text-secondary" style="font-weight:700">' +
            app.specialty +
            (app.clinicName ? ' • ' + app.clinicName : '') +
            '</p>' +
            '<p class="text-secondary" style="margin-top:0.35rem">الوقت: <strong>' +
            app.slot +
            '</strong></p></div>' +
            '<div class="badge-wrap"><span class="status-badge ' +
            statusClass(st) +
            '">' +
            label +
            '</span></div></div>' +
            '<div class="appointment-actions" style="margin-top:0.85rem">' +
            (canTrack
              ? '<a class="btn btn-outline btn-sm" href="track.html?id=' +
                encodeURIComponent(app.id) +
                '">متابعة الدور</a>'
              : '') +
            (canReschedule
              ? '<button type="button" class="btn btn-outline btn-sm" onclick="reschedule(\'' +
                app.id +
                '\')">إعادة جدولة</button>'
              : '') +
            (canCancel
              ? '<button type="button" class="btn btn-danger-outline btn-sm" onclick="cancelAppointment(\'' +
                app.id +
                '\')">إلغاء</button>'
              : '') +
            '</div></div></div>'
          );
        })
        .join('');
    }

    document.addEventListener('DOMContentLoaded', renderAppointments);
  </script>
</body>
</html>
