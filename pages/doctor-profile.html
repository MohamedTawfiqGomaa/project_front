<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تفاصيل الطبيب | Medi Queue</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .profile-header {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      margin-block-end: 2rem;
      animation: fadeIn 0.65s ease;
    }
    .profile-img-large {
      width: min(100%, 320px);
      aspect-ratio: 1;
      border-radius: var(--radius-lg);
      object-fit: cover;
      box-shadow: var(--shadow-lg);
      border: 6px solid var(--surface);
    }
    .info-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 1.5rem 2.5rem;
      margin-block-end: 1.5rem;
    }
    .info-stat-item h4 {
      font-size: 0.82rem;
      color: var(--text-secondary);
      margin-block-end: 0.35rem;
      font-weight: 800;
    }
    .info-stat-item p {
      font-size: 1.35rem;
      font-weight: 900;
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    .slot-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
      gap: 0.65rem;
      margin-top: 1rem;
    }
    .slot-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 0.85rem 0.5rem;
      border-radius: var(--radius);
      font-weight: 800;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
    }
    .slot-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: color-mix(in srgb, var(--primary) 8%, transparent);
      transform: translateY(-1px);
    }
    .slot-btn.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }
    .actions-row {
      margin-top: 1.5rem;
      display: flex;
      justify-content: flex-start;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    @media (max-width: 900px) {
      .profile-header {
        flex-direction: column;
        align-items: center;
        text-align: center;
      }
      .info-stats {
        justify-content: center;
      }
      .actions-row {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div id="particles-container"></div>
  <main class="main-content">
    <div class="container">
      <div id="profileContainer"></div>

      <section id="bookingSection" style="display: none" class="card mt-4 fade-in">
        <h2 style="font-size: 1.25rem; font-weight: 900; margin-block-end: 0.35rem">المواعيد المتاحة</h2>
        <p class="text-secondary">اختر وقتاً مناسباً ثم أكّد الحجز.</p>
        <div id="slotsGrid" class="slot-grid"></div>
        <div class="actions-row">
          <button type="button" id="confirmBtn" class="btn btn-primary btn-lg" disabled>تأكيد الحجز</button>
          <a href="home.html" class="btn btn-outline">رجوع</a>
        </div>
      </section>
    </div>
  </main>

  <script src="../js/data.js"></script>
  <script src="../js/main.js"></script>
  <script>
    var params = new URLSearchParams(window.location.search);
    var doctorId = parseInt(params.get('id'), 10);
    var doctor = AppStore.getDoctors().find(function (d) {
      return d.id === doctorId;
    });
    var selectedSlot = null;

    if (!doctor) {
      document.getElementById('profileContainer').innerHTML =
        '<div class="card text-center" style="padding:2.5rem"><h2 style="margin-block-end:0.75rem">الطبيب غير موجود</h2><a class="btn btn-primary" href="home.html">العودة للأطباء</a></div>';
    } else {
      document.title = doctor.name + ' | Medi Queue';
      renderProfile();
    }

    function renderProfile() {
      var clinic = getClinicById(doctor.clinicId);
      document.getElementById('profileContainer').innerHTML =
        '<div class="profile-header">' +
        '<img src="' +
        doctor.image +
        '" alt="' +
        doctor.name +
        '" class="profile-img-large" />' +
        '<div style="flex:1;min-width:0">' +
        '<span class="specialty" style="font-size:1rem">' +
        doctor.specialty +
        '</span>' +
        '<h1 style="font-size:clamp(1.6rem,3vw,2.35rem);margin-block:0.65rem 1rem;font-weight:900">' +
        doctor.name +
        '</h1>' +
        '<p class="text-secondary" style="margin-block-end:1rem;font-weight:700">' +
        (clinic ? clinic.name : '') +
        '</p>' +
        '<div class="info-stats">' +
        '<div class="info-stat-item"><h4>التقييم</h4><p><svg width="22" height="22" viewBox="0 0 24 24" fill="#ca8a04"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>' +
        doctor.rating +
        '</p></div>' +
        '<div class="info-stat-item"><h4>سعر الكشف</h4><p>' +
        formatDoctorPrice(doctor) +
        '</p></div>' +
        '</div>' +
        '<div class="card" style="text-align:start">' +
        '<h3 style="margin-block-end:0.55rem;font-weight:900">نبذة عن الطبيب</h3>' +
        '<p class="text-secondary" style="line-height:1.9">' +
        doctor.about +
        '</p>' +
        '</div></div></div>';

      document.getElementById('bookingSection').style.display = 'block';
      document.getElementById('slotsGrid').innerHTML = doctor.slots
        .map(function (slot) {
          return '<button type="button" class="slot-btn" data-slot="' + slot + '">' + slot + '</button>';
        })
        .join('');

      document.querySelectorAll('.slot-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          document.querySelectorAll('.slot-btn').forEach(function (b) {
            b.classList.remove('selected');
          });
          btn.classList.add('selected');
          selectedSlot = btn.getAttribute('data-slot');
          document.getElementById('confirmBtn').disabled = false;
        });
      });
    }

    document.getElementById('confirmBtn').addEventListener('click', function () {
      if (!selectedSlot) return;
      window.location.href =
        'booking.html?id=' + doctor.id + '&slot=' + encodeURIComponent(selectedSlot);
    });
  </script>
</body>
</html>
